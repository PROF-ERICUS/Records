<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo Tracker</title>

<style>
:root {
  --bg:#f4f7fb;
  --card:#fff;
  --primary:#0f766e;
  --accent:#14b8a6;
  --danger:#dc2626;
  --text:#1f2937;
  --border:#e5e7eb;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
}

.app{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:260px;
  background:var(--primary);
  color:#fff;
  padding:20px;
  position:sticky;
  top:0;
  height:100vh;
}

.main{
  flex:1;
  padding:20px;
}

h1,h2,h3{margin:0 0 10px;}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}

.value{
  font-size:22px;
  font-weight:bold;
}

.panel{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-primary{background:var(--primary);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
  font-size:14px;
}

.best{
  background:#ecfdf5;
}

@media(max-width:900px){
  .app{flex-direction:column;}
  .sidebar{width:100%;height:auto;}
  .cards{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
  <h2>MoMo Tracker</h2>

  <p><strong>Net:</strong> <span id="sideNet">0</span></p>
  <p><strong>Best Day:</strong> <span id="bestDay">-</span></p>
  <p><strong>Days:</strong> <span id="days">0</span></p>
</div>

<div class="main">

<input type="month" id="monthFilter">

<div class="cards">
  <div class="card">
    <h4>Cash-In Commission</h4>
    <div class="value" id="cashInTotal">0</div>
  </div>

  <div class="card">
    <h4>Cash-Out Commission</h4>
    <div class="value" id="cashOutTotal">0</div>
  </div>

  <div class="card">
    <h4>Expenses</h4>
    <div class="value" id="expensesTotal">0</div>
  </div>

  <div class="card">
    <h4>Net</h4>
    <div class="value" id="netTotal">0</div>
  </div>
</div>

<div class="panel">
  <h3>Add Record</h3>

  <form id="form">
    <input type="hidden" id="id">

    <label>Date</label>
    <input type="date" id="date" required>

    <label>Cash-In Commission</label>
    <input type="number" id="cin" required>

    <label>Cash-Out Commission</label>
    <input type="number" id="cout" required>

    <label>Expenses</label>
    <input type="number" id="exp" value="0">

    <br><br>

    <button class="btn-primary">Save</button>
  </form>
</div>

<div class="panel">
  <h3>Records</h3>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Cash-In</th>
        <th>Cash-Out</th>
        <th>Expenses</th>
        <th>Net</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="table"></tbody>
  </table>
</div>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("momo") || "[]");

const form = document.getElementById("form");

form.onsubmit = (e)=>{
  e.preventDefault();

  const record = {
    id: Date.now(),
    date: date.value,
    cin: +cin.value,
    cout: +cout.value,
    exp: +exp.value
  };

  data.push(record);
  save();
};

function save(){
  localStorage.setItem("momo", JSON.stringify(data));
  render();
  form.reset();
}

function render(){
  const month = document.getElementById("monthFilter").value;

  let filtered = data.filter(r=>r.date.startsWith(month));

  let best = null;
  let bestVal = -999;

  let cin=0, cout=0, exp=0;

  table.innerHTML="";

  filtered.forEach(r=>{
    const net = r.cin + r.cout - r.exp;

    cin+=r.cin;
    cout+=r.cout;
    exp+=r.exp;

    if(net>bestVal){
      bestVal=net;
      best=r.date;
    }

    const tr = document.createElement("tr");

    if(net===bestVal) tr.classList.add("best");

    tr.innerHTML=`
      <td>${r.date}</td>
      <td>${r.cin}</td>
      <td>${r.cout}</td>
      <td>${r.exp}</td>
      <td>${net}</td>
      <td>
        <button onclick="del(${r.id})" class="btn-danger">Delete</button>
      </td>
    `;

    table.appendChild(tr);
  });

  document.getElementById("cashInTotal").innerText = cin;
  document.getElementById("cashOutTotal").innerText = cout;
  document.getElementById("expensesTotal").innerText = exp;
  document.getElementById("netTotal").innerText = cin+cout-exp;

  document.getElementById("sideNet").innerText = cin+cout-exp;
  document.getElementById("bestDay").innerText = best || "-";
  document.getElementById("days").innerText = filtered.length;
}

function del(id){
  data = data.filter(r=>r.id!==id);
  save();
}

document.getElementById("monthFilter").value = new Date().toISOString().slice(0,7);

render();
</script>

</body>
</html>
